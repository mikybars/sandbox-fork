services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rent
      POSTGRES_USER: gabrielo
      POSTGRES_PASSWORD: gabrielo
    ports:
      - "5433:5433"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
